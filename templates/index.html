<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Password Generator Pro - Login</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1241a1",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111621",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                },
            },
        }
    </script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display flex items-center justify-center min-h-screen p-4">

<div class="w-full max-w-[480px] flex flex-col items-center">

    <!-- Logo -->
    <div class="mb-8 text-primary">
        <span class="material-symbols-outlined text-6xl"
              style="font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;">
            lock_person
        </span>
    </div>

    <!-- Title -->
    <div class="text-center mb-10">
        <h1 class="text-slate-900 dark:text-slate-100 text-3xl font-bold tracking-tight mb-2">
            Password Generator Pro
        </h1>
        <p class="text-slate-500 dark:text-slate-400 text-sm">
            Crea y protege tus contraseñas
        </p>
    </div>

    <!-- Login Card -->
    <div class="w-full bg-white dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-xl shadow-xl shadow-slate-200/50 dark:shadow-none p-8">

        <!-- 🔥 FORM CONECTADO A FLASK -->
        <form method="POST" class="space-y-6">

            <!-- Mensaje de error -->
            {% if error %}
            <div class="bg-red-100 text-red-700 px-4 py-3 rounded-lg text-sm">
                {{ error }}
            </div>
            {% endif %}

            <!-- Username -->
            <div class="flex flex-col gap-2">
                <label class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal flex items-center gap-2">
                    <span class="material-symbols-outlined text-sm">alternate_email</span>
                    Usuario
                </label>

                <input
                    type="text"
                    name="username"
                    placeholder="Ingresa tu nombre de usuario"
                    required
                    class="form-input flex w-full rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 focus:border-primary h-12 placeholder:text-slate-400 dark:placeholder:text-slate-500 px-4 text-base font-normal transition-colors"
                >
            </div>

            <!-- Password -->
            <div class="flex flex-col gap-2">
                <div class="flex justify-between items-center">
                    <label class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-normal flex items-center gap-2">
                        <span class="material-symbols-outlined text-sm">lock</span>
                        Contraseña
                    </label>
                    <a href="#" class="text-primary text-xs font-medium hover:underline">
                        ¿Olvidaste tu contraseña?
                    </a>
                </div>

                <input
                    type="password"
                    name="password"
                    placeholder="Ingresa tu contraseña"
                    required
                    class="form-input flex w-full rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 focus:border-primary h-12 placeholder:text-slate-400 dark:placeholder:text-slate-500 px-4 text-base font-normal transition-colors"
                >
            </div>

            <!-- Button -->
            <button
                type="submit"
                class="w-full flex cursor-pointer items-center justify-center overflow-hidden rounded-lg h-12 px-5 bg-primary hover:bg-primary/90 text-white text-base font-bold leading-normal tracking-wide transition-all shadow-lg shadow-primary/20">
                <span class="truncate">Login</span>
            </button>

        </form>

    </div>

</div>

</body>
</html>
